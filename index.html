<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>

body{
    margin:0;
    font-family: "Comic Sans MS", cursive;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin:10px;
}

#loveBtn{
    background:#ff4d6d;
    color:white;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#888;
    color:white;
}

#message{
    margin-top:20px;
    font-size:18px;
    color:#ff4d6d;
    display:none;
}

#lovePhoto{
    margin-top:20px;
    width:200px;
    border-radius:15px;
    display:none;
}

/* floating hearts */

.heart{
    position:absolute;
    color:red;
    animation:float 5s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-800px);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">

<h1>Hi My Love ❤️</h1>

<p>I made this little website just for you.</p>

<button id="loveBtn">Click Me 💌</button>

<div id="message">
You are the best thing that ever happened to me 💕
</div>

<!-- IMAGE -->
<img id="lovePhoto" src="images/love.jpg">

<br><br>

<p>Do you love me?</p>

<button id="yesBtn">Yes 💖</button>
<button id="noBtn">No 😅</button>

</div>

<script>

/* show message + photo */

document.getElementById("loveBtn").onclick = function(){
    document.getElementById("message").style.display="block";
    document.getElementById("lovePhoto").style.display="block";
}

/* funny no button */

let noBtn = document.getElementById("noBtn")

noBtn.addEventListener("mouseover", function(){
    let x = Math.random()*300-150
    let y = Math.random()*200-100

    noBtn.style.transform = `translate(${x}px,${y}px)`
})

/* yes button */

document.getElementById("yesBtn").onclick = function(){
    alert("I love you more ❤️🥰")
}

/* floating hearts */

function createHeart(){
    const heart = document.createElement("div")
    heart.classList.add("heart")
    heart.innerHTML="❤️"

    heart.style.left=Math.random()*100+"vw"
    heart.style.fontSize=(Math.random()*20+10)+"px"

    document.body.appendChild(heart)

    setTimeout(()=>{
        heart.remove()
    },5000)
}

setInterval(createHeart,300)

</script>

</body>
</html>
